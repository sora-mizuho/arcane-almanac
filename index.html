                        {/* シナリオ名の下: リンク類 */}
                        {(ev.discord || ev.url || (ev.cat === "TRPG" && ev.scenarioId)) && (
                          <div style={{ marginTop: 3, display: "flex", gap: 14, alignItems: "baseline", flexWrap: "wrap", justifyContent: "flex-end" }}>
                            {ev.cat === "TRPG" && ev.scenarioId && (() => {
                              const sc = scenarios.find(x => x.id === ev.scenarioId);
                              return sc ? (
                                <button onClick={() => { setScViewId(sc.id); setView("scenario"); window.scrollTo({ top: 0, behavior: "smooth" }); }}
                                  style={{ fontFamily: mono, fontSize: 11, color: T.gold, background: "none", border: "none", cursor: "pointer", padding: 0, textDecoration: "none" }}>
                                  📚 シナリオ管理で見る →
                                </button>
                              ) : null;
                            })()}
                            {ev.discord && (
                              <a href={ev.discord} target="_blank" rel="noreferrer"
                                style={{ fontFamily: mono, fontSize: 11, color: "#5865F2", textDecoration: "none" }}>💬 Discord ↗</a>
                            )}
                            {ev.url && (
                              <a href={ev.url} target="_blank" rel="noreferrer"
                                style={{ fontFamily: mono, fontSize: 11, color: T.green, textDecoration: "none" }}>{linkLabel(ev.url)} ↗</a>
                            )}
                          </div>
                        )}
                        {/* 2段目: 操作を1行右寄せ(クリックで開閉) */}
                        <div style={{ marginTop: focused ? 8 : 0, maxHeight: focused ? 120 : 0, overflow: "hidden", transition: "max-height 0.2s, margin-top 0.2s" }}>
                          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", justifyContent: "flex-end" }}>
                            {ev.cat === "TRPG" && (
                              ev.recorded ? (
                                <span style={{ fontFamily: mono, fontSize: 11, color: T.dim, padding: "4px 10px" }}>転記済 ✓</span>
                              ) : (
                                <Btn small color={T.gold} border={T.gold} onClick={() => recordSessionFromEvent(ev)}>📔 日誌へ転記</Btn>
                              )
                            )}
                            <Btn small onClick={() => {
                              setNewEvent({ date: "", endDate: "", time: "", title: "", cat: "配信", repeat: "none", url: "", role: "PL", characterId: "", campaign: "", discord: "", ...ev });
                              window.scrollTo({ top: 0, behavior: "smooth" });
                            }}>✎ 編集</Btn>
                            <Btn small color={T.red} border={T.red} onClick={() => persistEvents(events.filter((x) => x.id !== ev.id))}>× 削除</Btn>
                          </div>
                        </div>
                        {/* 折りたたみ時の開くヒント */}
                        {!focused && (
                          <div onClick={() => setEventFocusId(ev.id)}
                            style={{ marginTop: 2, fontFamily: mono, fontSize: 10, color: T.dim, cursor: "pointer", textAlign: "right" }}>
                            ▾ 操作(転記・編集・削除)
                          </div>
                        )}
                        {focused && (
                          <div onClick={() => setEventFocusId(null)}
                            style={{ marginTop: 6, fontFamily: mono, fontSize: 10, color: T.dim, cursor: "pointer", textAlign: "right" }}>
                            ▴ 閉じる
                          </div>
                        )}
                      </div>
                    );
                  };

                  const sorted = [...inMonth].sort((a, b) => repDay(a) - repDay(b));
                  const camps = [...new Set(sorted.map((e) => e.campaign).filter(Boolean))];
                  const solo = sorted.filter((e) => !e.campaign);
                  return (
                    <React.Fragment>
                      {camps.map((cp) => {
                        const items = sorted.filter((e) => e.campaign === cp);
                        const allItems = events.filter((e) => e.campaign === cp);
                        const done = allItems.filter((e) => e.recorded).length;
                        return (
                          <div key={cp} style={{ marginBottom: 10, border: `1px solid ${T.line}`, borderLeft: `4px solid ${T.gold}`, borderRadius: 2, padding: "8px 12px", background: T.panel }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                              <span style={{ fontFamily: serif, fontSize: 15, color: T.gold }}>📖 {cp}</span>
                              <span style={{ fontFamily: mono, fontSize: 10, color: T.dim }}>通算 全{allItems.length}回 / 記録済 {done}</span>
                            </div>
                            {items.map(renderRow)}
                          </div>
                        );
                      })}
                      {solo.map(renderRow)}
                    </React.Fragment>
                  );
                })()}
              </Section>
            </div>
          );
        })()}

        {/* ===== セッション日誌 ===== */}
        {view === "journal" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontFamily: serif, fontSize: 22 }}>セッション日誌 <span style={{ fontFamily: mono, fontSize: 12, color: T.dim }}>{journal.length} 件</span></div>
              <Btn color={T.green} border={T.green} onClick={() => setJDraft(blankJournalEntry())}>+ 記録を書く</Btn>
            </div>

            {jDraft && (
              <Section title={journal.some((x) => x.id === jDraft.id) ? "記録を編集 EDIT ENTRY" : "新しい記録 NEW ENTRY"}>
                <div style={{ display: "grid", gap: 12 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "auto 2fr 1fr", gap: 12, alignItems: "end" }}>
                    <div>
                      <Label>日付</Label>
                      <input type="date" value={jDraft.date}
                        onChange={(e) => setJDraft({ ...jDraft, date: e.target.value })}
                        style={{ ...inputStyle, fontFamily: mono, width: 155 }} />
                    </div>
                    <Field label="シナリオ名" value={jDraft.scenario}
                      onChange={(v) => setJDraft({ ...jDraft, scenario: v })} />
                    <div>
                      <Label>探索者(名前で検索可)</Label>
                      <CharPicker characters={characters} value={jDraft.characterId}
                        onChange={(id) => setJDraft({ ...jDraft, characterId: id })}
                        width="100%" noneLabel="(なし / GM等)" />
                    </div>
                  </div>
                  <div>
                    <Label>シナリオ管理と連携（任意）</Label>
                    <ScenarioPicker scenarios={scenarios} value={jDraft.scenarioId || ""}
                      onChange={id => {
                        const sc = scenarios.find(x => x.id === id);
                        setJDraft({ ...jDraft, scenarioId: id, scenario: sc && !jDraft.scenario.trim() ? sc.title : jDraft.scenario });
                      }} />
                  </div>
                  <Field label="同卓者" value={jDraft.party}
                    onChange={(v) => setJDraft({ ...jDraft, party: v })}
                    placeholder="KP: 〇〇 / PL: △△(探索者名)、□□ など" />
                  <Area label="エンディング" rows={2} value={jDraft.ending}
                    onChange={(v) => setJDraft({ ...jDraft, ending: v })}
                    placeholder="生還 / ロスト / END-B など、結末の記録" />
                  <Area label="後遺症" rows={2} value={jDraft.aftermath}
                    onChange={(v) => setJDraft({ ...jDraft, aftermath: v })}
                    placeholder="不定の狂気、SAN減少、負傷、得たもの など" />
                  <Area label="その他メモ" rows={3} value={jDraft.memo}
                    onChange={(v) => setJDraft({ ...jDraft, memo: v })}
                    placeholder="印象的なロールプレイ、名言、反省点 など" />
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn color={T.green} border={T.green} onClick={saveJournal}>保存する</Btn>
                    <Btn onClick={() => setJDraft(null)}>キャンセル</Btn>
                  </div>
                </div>
              </Section>
            )}

            {journal.length > 0 && (
              <input
                placeholder="🔍 シナリオ・日付・同卓者・メモで検索…"
                value={journalSearch}
                onChange={e => setJournalSearch(e.target.value)}
                style={{ ...inputStyle, width: "100%", marginBottom: 12, boxSizing: "border-box" }}
              />
            )}

            {journal.length === 0 && !jDraft && (
              <div style={{ border: `1px dashed ${T.line}`, padding: 40, textAlign: "center", color: T.dim, fontFamily: serif, background: T.panel }}>
                まだ日誌がありません。「+ 記録を書く」から最初のセッションを記録しましょう。
              </div>
            )}

            <div style={{ display: "grid", gap: 12 }}>
              {[...journal]
                .filter(j => {
                  if (!journalSearch.trim()) return true;
                  const q = journalSearch.trim().toLowerCase();
                  return [j.scenario, j.date, j.party, j.memo, j.ending, j.aftermath]
                    .some(f => (f || "").toLowerCase().includes(q));
                })
                .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))
                .map((j) => {
                  const ch = charById(j.characterId);
                  const focused = j.id === journalFocusId;
                  return (
                    <div key={j.id} style={{
                      background: T.panel, border: `1px solid ${focused ? T.gold : T.line}`,
                      borderLeft: `4px solid ${focused ? T.gold : T.line}`,
                      boxShadow: focused ? `0 0 0 1px ${T.gold}` : "0 1px 3px rgba(46,42,35,0.08)",
                      borderRadius: 2, padding: 16,
                    }}>
                      <div style={{ display: "flex", gap: 12, alignItems: "baseline", flexWrap: "wrap" }}>
                        <span style={{ fontFamily: mono, fontSize: 12, color: T.dim }}>{j.date || "日付不明"}</span>
                        <span style={{ fontFamily: serif, fontSize: 18, flex: 1 }}>{j.scenario || "(シナリオ名未記入)"}</span>
                        {ch && (
                          <span onClick={() => openView(ch)}
                            style={{ fontFamily: serif, fontSize: 13, color: T.green, cursor: "pointer", textDecoration: "underline" }}>
                            {ch.name || "(名称未記入)"} のシートへ
                          </span>
                        )}
                        {j.scenarioId && (() => {
                          const sc = scenarios.find(x => x.id === j.scenarioId);
                          return sc ? (
                            <button onClick={() => { setScViewId(sc.id); setView("scenario"); window.scrollTo({ top: 0, behavior: "smooth" }); }}
                              style={{ fontFamily: mono, fontSize: 11, color: T.gold, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                              📚 シナリオ管理で見る →
                            </button>
                          ) : null;
                        })()}
                        <Btn small onClick={() => { setJournalFocusId(j.id); setJDraft({ ...j }); window.scrollTo({ top: 0, behavior: "smooth" }); }}>✎ 編集</Btn>
                        <button title="削除"
                          onClick={() => { if (confirm("この記録を削除しますか?")) persistJournal(journal.filter((x) => x.id !== j.id)); }}
                          style={{ background: "transparent", border: "none", color: T.red, cursor: "pointer", fontFamily: mono }}>×</button>
                      </div>
                      {(j.party || j.ending || j.aftermath || j.memo) && (
                        <div style={{ marginTop: 10, display: "grid", gap: 6, fontFamily: serif, fontSize: 13.5, lineHeight: 1.7 }}>
                          {j.party && (
                            <div><span style={{ fontFamily: mono, fontSize: 10, color: T.dim, letterSpacing: 1 }}>同卓者 </span>{j.party}</div>
                          )}
                          {j.ending && (
                            <div><span style={{ fontFamily: mono, fontSize: 10, color: T.gold, letterSpacing: 1 }}>エンディング </span>{j.ending}</div>
                          )}
                          {j.aftermath && (
                            <div style={{ display: "flex", gap: 6, alignItems: "flex-start" }}>
                              <span style={{ fontFamily: mono, fontSize: 10, color: T.red, letterSpacing: 1, flexShrink: 0, lineHeight: 1.7 }}>後遺症</span>
                              <span style={{ whiteSpace: "pre-wrap" }}>{j.aftermath}</span>
                            </div>
                          )}
                          {j.memo && (
                            <div style={{ display: "flex", gap: 6, alignItems: "flex-start" }}>
                              <span style={{ fontFamily: mono, fontSize: 10, color: T.dim, letterSpacing: 1, flexShrink: 0, lineHeight: 1.7 }}>メモ</span>
                              <span style={{ whiteSpace: "pre-wrap" }}>{j.memo}</span>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
            </div>
          </div>
        )}

        {/* ===== 視聴リスト(YouTube) ===== */}
        {view === "watch" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontFamily: serif, fontSize: 22 }}>視聴リスト <span style={{ fontFamily: mono, fontSize: 12, color: T.dim }}>{watch.length} 件</span></div>
            </div>

            {/* 再生中プレーヤー */}
            {playing && (
              <div style={{ marginBottom: 18 }}>
                <div style={{ position: "relative", paddingTop: "56.25%", background: "#000", borderRadius: 2, overflow: "hidden", border: `1px solid ${T.line}` }}>
                  <iframe src={playing} title="player" allowFullScreen
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: 0 }} />
                </div>
                <div style={{ textAlign: "right", marginTop: 6 }}>
                  <Btn small onClick={() => setPlaying(null)}>プレーヤーを閉じる</Btn>
                </div>
              </div>
            )}

            {/* 追加フォーム */}
            <Section title="動画・再生リストを追加 ADD VIDEO / PLAYLIST">
              <div style={{ fontFamily: serif, fontSize: 12.5, color: T.dim, marginBottom: 8, lineHeight: 1.7 }}>
                YouTubeの動画URL・再生リストURLのどちらでも貼り付けられます(例: <span style={{ fontFamily: mono }}>youtube.com/playlist?list=…</span>)。再生リストはプレーヤー内で連続再生されます。
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 180 }}>
                  <Field label="タイトル(任意)" value={newWatch.title}
                    onChange={(v) => setNewWatch({ ...newWatch, title: v })} />
                </div>
                <div style={{ flex: 2, minWidth: 240 }}>
                  <Field label="YouTube URL" value={newWatch.url}
                    onChange={(v) => setNewWatch({ ...newWatch, url: v })}
                    placeholder="https://www.youtube.com/watch?v=… または …/playlist?list=…" />
                </div>
                <Btn small color={T.green} border={T.green} onClick={() => {
                  const yt = parseYouTube(newWatch.url);
                  if (!yt) { alert("YouTubeのURLを認識できませんでした。"); return; }
                  persistWatch([{ id: "w" + Date.now().toString(36), title: newWatch.title.trim(), url: newWatch.url, ...yt }, ...watch]);
                  setNewWatch({ title: "", url: "" });
                }}>+ 追加</Btn>
              </div>
            </Section>

            {watch.length === 0 && (
              <div style={{ border: `1px dashed ${T.line}`, padding: 40, textAlign: "center", color: T.dim, fontFamily: serif, background: T.panel }}>
                まだ登録がありません。お気に入りの配信や再生リストを追加しましょう。
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 14 }}>
              {watch.map((w) => (
                <div key={w.id} style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 2, overflow: "hidden", boxShadow: "0 1px 3px rgba(46,42,35,0.08)" }}>
                  <div onClick={() => setPlaying(w.embed)}
                    style={{ position: "relative", paddingTop: "56.25%", background: w.thumb ? `center/cover no-repeat url(${w.thumb})` : T.panel2, cursor: "pointer" }}>
                    <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ fontSize: 34, color: "#fff", textShadow: "0 1px 6px rgba(0,0,0,0.6)" }}>▶</span>
                    </div>
                    {w.listId && (
                      <span style={{ position: "absolute", right: 6, bottom: 6, fontFamily: mono, fontSize: 9, color: "#fff", background: "rgba(0,0,0,0.7)", padding: "2px 6px", borderRadius: 3 }}>
                        ☰ 再生リスト
                      </span>
                    )}
                  </div>
                  <div style={{ padding: 10 }}>
                    <div style={{ fontFamily: serif, fontSize: 14, marginBottom: 6, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {w.title || (w.listId ? "再生リスト" : "動画")}
                    </div>
                    <div style={{ display: "flex", gap: 10, alignItems: "baseline" }}>
                      <span onClick={() => setPlaying(w.embed)}
                        style={{ fontFamily: mono, fontSize: 11, color: T.green, cursor: "pointer" }}>▶ 再生</span>
                      <a href={w.url} target="_blank" rel="noreferrer"
                        style={{ fontFamily: mono, fontSize: 11, color: T.dim, textDecoration: "none" }}>YouTubeで開く ↗</a>
                      <button onClick={() => persistWatch(watch.filter((x) => x.id !== w.id))} title="削除"
                        style={{ marginLeft: "auto", background: "transparent", border: "none", color: T.red, cursor: "pointer", fontFamily: mono }}>×</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ===== ポスト集(X / Twitter) ===== */}
        {view === "posts" && (() => {
          const allTags = [...new Set(posts.flatMap((p) => p.tags || []))].sort();
          const shown = postFilter ? posts.filter((p) => (p.tags || []).includes(postFilter)) : posts;
          return (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
                <div style={{ fontFamily: serif, fontSize: 22 }}>ポスト集 <span style={{ fontFamily: mono, fontSize: 12, color: T.dim }}>{posts.length} 件</span></div>
              </div>

              <Section title="ポストを追加 ADD POST(Xの投稿URL)">
                <div style={{ fontFamily: serif, fontSize: 12.5, color: T.dim, marginBottom: 8, lineHeight: 1.7 }}>
                  Xの個別ポストのURL(<span style={{ fontFamily: mono }}>x.com/ユーザー名/status/…</span>)を貼り付けてください。タグは「,」区切りで複数付けられます(例: 探索者名、シナリオ名など)。
                </div>
                <div style={{ display: "grid", gap: 10 }}>
                  <Field label="ポストURL" value={newPost.url}
                    onChange={(v) => setNewPost({ ...newPost, url: v })}
                    placeholder="https://x.com/username/status/1234567890" />
                  <div style={{ display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
                    <div style={{ flex: 1, minWidth: 200 }}>
                      <Field label="タグ(, 区切り)" value={newPost.tags}
                        onChange={(v) => setNewPost({ ...newPost, tags: v })}
                        placeholder="探索者A, 悪霊の家, 名シーン" />
                    </div>
                    <div style={{ flex: 1, minWidth: 200 }}>
                      <Field label="メモ(任意)" value={newPost.memo}
                        onChange={(v) => setNewPost({ ...newPost, memo: v })} />
                    </div>
                    <Btn small color={T.green} border={T.green} onClick={() => {
                      const x = parseXPost(newPost.url);
                      if (!x) { alert("XのポストURLを認識できませんでした。"); return; }
                      const tags = newPost.tags.split(",").map((t) => t.trim()).filter(Boolean);
                      persistPosts([{ id: "p" + Date.now().toString(36), ...x, url: x.canonical, tags, memo: newPost.memo.trim() }, ...posts]);
                      setNewPost({ url: "", tags: "", memo: "" });
                    }}>+ 追加</Btn>
                  </div>
                  {(() => {
                    const cur = newPost.tags.split(",").map((t) => t.trim()).filter(Boolean);
                    const addTag = (nm) => { if (!cur.includes(nm)) setNewPost({ ...newPost, tags: [...cur, nm].join(", ") }); };
                    const usedTags = [...new Set(posts.flatMap((p) => p.tags || []))].sort();
                    const unusedTags = usedTags.filter((t) => !cur.includes(t));
                    return (
                      <div style={{ display: "grid", gap: 6 }}>
                        {unusedTags.length > 0 && (
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 5, alignItems: "center" }}>
                            <span style={{ fontFamily: mono, fontSize: 11, color: T.dim, marginRight: 2 }}>既存タグ:</span>
                            {unusedTags.map((t) => (
                              <span key={t} onClick={() => addTag(t)}
                                style={{ cursor: "pointer", fontFamily: mono, fontSize: 10, color: T.gold, background: T.panel2, border: `1px solid ${T.line}`, padding: "2px 8px", borderRadius: 9 }}>
                                + {t}
                              </span>
                            ))}
                          </div>
                        )}
                        {characters.length > 0 && (
                          <CharTagAdder characters={characters} currentTags={cur} onAdd={addTag} />
                        )}
                      </div>
                    );
                  })()}
                </div>
              </Section>

              {/* タグ絞り込み */}
              {allTags.length > 0 && (
                <div style={{ marginBottom: 14, display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
                  <span style={{ fontFamily: mono, fontSize: 11, color: T.dim, marginRight: 4 }}>タグ:</span>
                  <span onClick={() => setPostFilter("")}
                    style={{ cursor: "pointer", fontFamily: mono, fontSize: 11, padding: "3px 10px", borderRadius: 10, border: `1px solid ${postFilter === "" ? T.gold : T.line}`, color: postFilter === "" ? T.gold : T.dim }}>
                    すべて ({posts.length})
                  </span>
                  {allTags.map((t) => {
                    const n = posts.filter((p) => (p.tags || []).includes(t)).length;
                    return (
                      <span key={t} onClick={() => setPostFilter(t === postFilter ? "" : t)}
                        style={{ cursor: "pointer", fontFamily: mono, fontSize: 11, padding: "3px 10px", borderRadius: 10, border: `1px solid ${postFilter === t ? T.gold : T.line}`, color: postFilter === t ? T.gold : T.paper, background: postFilter === t ? T.panel2 : "transparent" }}>
                        {t} ({n})
                      </span>
                    );
                  })}
                </div>
              )}

              {posts.length === 0 && (
                <div style={{ border: `1px dashed ${T.line}`, padding: 40, textAlign: "center", color: T.dim, fontFamily: serif, background: T.panel }}>
                  まだポストがありません。残しておきたいXの投稿を登録しましょう。
                </div>
              )}

              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 16, alignItems: "start" }}>
                {shown.map((p) => (
                  <div key={p.id} style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 2, padding: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6, gap: 8 }}>
                      <span style={{ fontFamily: mono, fontSize: 11, color: T.dim }}>@{p.user}</span>
                      <div style={{ display: "flex", gap: 10, alignItems: "baseline" }}>
                        <a href={p.canonical} target="_blank" rel="noreferrer"
                          style={{ fontFamily: mono, fontSize: 11, color: T.green, textDecoration: "none" }}>Xで開く ↗</a>
                        <button onClick={() => persistPosts(posts.filter((x) => x.id !== p.id))} title="削除"
                          style={{ background: "transparent", border: "none", color: T.red, cursor: "pointer", fontFamily: mono }}>×</button>
                      </div>
                    </div>
                    {p.memo && <div style={{ fontFamily: serif, fontSize: 13, marginBottom: 6 }}>{p.memo}</div>}
                    <XEmbed post={p} />
                    {(p.tags || []).length > 0 && (
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 8 }}>
                        {p.tags.map((t) => (
                          <span key={t} onClick={() => setPostFilter(t)}
                            style={{ cursor: "pointer", fontFamily: mono, fontSize: 10, color: T.gold, background: T.panel2, border: `1px solid ${T.line}`, padding: "1px 7px", borderRadius: 9 }}>
                            {t}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* ===== クイックメモ ===== */}
        {view === "memo" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontFamily: serif, fontSize: 22 }}>クイックメモ <span style={{ fontFamily: mono, fontSize: 12, color: T.dim }}>{memos.length} 件</span></div>
              <Btn color={T.green} border={T.green} onClick={() => { setMemoDraft(blankMemo()); window.scrollTo({ top: 0, behavior: "smooth" }); }}>+ 新しいメモ</Btn>
            </div>

            {memoDraft && (
              <Section title={memos.some((x) => x.id === memoDraft.id) ? "メモを編集 EDIT" : "新しいメモ NEW MEMO"}>
                <div style={{ display: "grid", gap: 12 }}>
                  <Field label="タイトル(任意)" value={memoDraft.title}
                    onChange={(v) => setMemoDraft({ ...memoDraft, title: v })} />
                  <Area label="内容" rows={8} value={memoDraft.content}
                    onChange={(v) => setMemoDraft({ ...memoDraft, content: v })}
                    placeholder="書き留めておきたいことを…" />
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn color={T.green} border={T.green} onClick={() => {
                      if (!memoDraft.content.trim() && !memoDraft.title.trim()) return;
                      const m = { ...memoDraft, updatedAt: Date.now() };
                      const exists = memos.some((x) => x.id === m.id);
                      persistMemos(exists ? memos.map((x) => (x.id === m.id ? m : x)) : [m, ...memos]);
                      setMemoDraft(null);
                    }}>保存する</Btn>
                    <Btn onClick={() => setMemoDraft(null)}>キャンセル</Btn>
                  </div>
                </div>
              </Section>
            )}

            {memos.length === 0 && !memoDraft && (
              <div style={{ border: `1px dashed ${T.line}`, padding: 40, textAlign: "center", color: T.dim, fontFamily: serif, background: T.panel }}>
                まだメモはありません。「+ 新しいメモ」から書き留めましょう。
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
              {memos.map((m) => (
                <div key={m.id} style={{ background: T.panel, border: `1px solid ${T.line}`, borderTop: `3px solid ${T.gold}`, borderRadius: 2, padding: 16, boxShadow: "0 1px 3px rgba(46,42,35,0.08)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8, gap: 8 }}>
                    <div style={{ fontFamily: serif, fontSize: 16, fontWeight: 600 }}>{m.title || "(無題)"}</div>
                    <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                      <Btn small onClick={() => { setMemoDraft({ ...m }); window.scrollTo({ top: 0, behavior: "smooth" }); }}>✎</Btn>
                      <button onClick={() => { if (confirm("このメモを削除しますか?")) persistMemos(memos.filter((x) => x.id !== m.id)); }}
                        style={{ background: "transparent", border: "none", color: T.red, cursor: "pointer", fontFamily: mono, fontSize: 14 }}>×</button>
                    </div>
                  </div>
                  <div style={{ fontFamily: serif, fontSize: 13.5, lineHeight: 1.8, whiteSpace: "pre-wrap", color: T.paper }}>
                    {m.content}
                  </div>
                  <div style={{ fontFamily: mono, fontSize: 10, color: T.dim, marginTop: 10, textAlign: "right" }}>
                    {new Date(m.updatedAt).toLocaleDateString("ja-JP")}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ===== シナリオ管理 ===== */}
        {view === "scenario" && (
          <div>
            {/* ── 編集フォーム ── */}
            {scDraft && (() => {
              const SC_PRESETS = [
                { label: "プレイ人数", tags: ["タイマン", "1人", "2人", "3人", "4人", "5人以上"] },
                { label: "形式・向け", tags: ["新規向け", "継続可", "単発", "キャンペーン", "ソロ"] },
              ];
              return (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 8 }}>
                    <Btn onClick={() => setScDraft(null)} small>← {scViewId ? "詳細に戻る" : "一覧に戻る"}</Btn>
                    <div style={{ display: "flex", gap: 8 }}>
                      {scenarios.some(x => x.id === scDraft.id) && (
                        <Btn small color={T.red} border={T.red} onClick={() => {
                          if (!window.confirm("このシナリオを削除しますか？")) return;
                          persistScenarios(scenarios.filter(x => x.id !== scDraft.id));
                          setScDraft(null); setScViewId(null);
                        }}>削除</Btn>
                      )}
                      <Btn color={T.green} border={T.green} onClick={saveScenarioDraft}>保存する</Btn>
                    </div>
                  </div>
                  <Section title="基本情報">
                    <div style={{ display: "grid", gap: 10 }}>
                      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "2fr 1fr", gap: 10 }}>
                        <Field label="シナリオ名 *" value={scDraft.title} onChange={v => setScDraft({ ...scDraft, title: v })} placeholder="例: 悪霊の家" />
                        <Field label="著者・サークル" value={scDraft.author} onChange={v => setScDraft({ ...scDraft, author: v })} />
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 10 }}>
                        <div>
                          <Label>ルール</Label>
                          <select value={scDraft.edition} onChange={e => setScDraft({ ...scDraft, edition: e.target.value })} style={{ ...inputStyle, padding: "8px 6px" }}>
                            <option value="">指定なし</option>
                            <option value="6e">第6版</option>
                            <option value="7e">第7版</option>
                            <option value="other">その他</option>
                          </select>
                        </div>
                        <div>
                          <Label>ステータス</Label>
                          <select value={scDraft.status} onChange={e => setScDraft({ ...scDraft, status: e.target.value })} style={{ ...inputStyle, padding: "8px 6px" }}>
                            {SCENARIO_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        </div>
                      </div>
                      <Field label="URL（購入先・紹介ページ等）" value={scDraft.url} onChange={v => setScDraft({ ...scDraft, url: v })} />
                    </div>
                  </Section>
                  <Section title="タグ">
                    {SC_PRESETS.map(group => (
                      <div key={group.label} style={{ marginBottom: 10 }}>
                        <div style={{ fontFamily: mono, fontSize: 10, color: T.dim, marginBottom: 5 }}>{group.label}:</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                          {group.tags.map(preset => {
                            const active = (scDraft.tags || []).includes(preset);
                            return (
                              <button key={preset}
                                onClick={() => setScDraft(prev => { const t = prev.tags || []; return { ...prev, tags: active ? t.filter(x => x !== preset) : [...t, preset] }; })}
                                style={{ fontFamily: mono, fontSize: 10, cursor: "pointer", padding: "2px 10px", borderRadius: 10, border: `1px solid ${active ? T.gold : T.line}`, background: active ? T.gold : "transparent", color: active ? "#fff" : T.dim }}>
                                {active ? "✓ " : ""}{preset}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5, padding: "6px 8px", background: T.bg, border: `1px solid ${T.line}`, borderRadius: 4, minHeight: 38, alignItems: "center" }}>
                      {(scDraft.tags || []).map((tag, ti) => (
                        <span key={ti} style={{ display: "inline-flex", alignItems: "center", gap: 3, background: T.panel2, border: `1px solid ${T.line}`, borderRadius: 10, padding: "2px 5px 2px 9px", fontFamily: mono, fontSize: 11, color: T.text }}>
                          #{tag}
                          <button onClick={() => setScDraft(prev => ({ ...prev, tags: (prev.tags || []).filter((_, j) => j !== ti) }))}
                            style={{ background: "none", border: "none", color: T.dim, cursor: "pointer", padding: "0 2px", lineHeight: 1, fontSize: 13 }}>×</button>
                        </span>
                      ))}
                      <input placeholder={(scDraft.tags || []).length === 0 ? "フリータグを入力してEnter…" : ""}
                        style={{ flex: 1, minWidth: 100, background: "none", border: "none", outline: "none", fontFamily: mono, fontSize: 12, color: T.text }}
                        onKeyDown={e => {
                          const val = e.target.value.trim().replace(/,+$/, "");
                          if ((e.key === "Enter" || e.key === ",") && val) {
                            e.preventDefault();
                            if (!(scDraft.tags || []).includes(val)) setScDraft(prev => ({ ...prev, tags: [...(prev.tags || []), val] }));
                            e.target.value = "";
                          } else if (e.key === "Backspace" && !e.target.value && (scDraft.tags || []).length > 0) {
                            setScDraft(prev => ({ ...prev, tags: prev.tags.slice(0, -1) }));
                          }
                        }} />
                    </div>
                    <div style={{ fontFamily: mono, fontSize: 10, color: T.dim, marginTop: 4 }}>Enter またはカンマで追加 / Backspace で末尾削除</div>
                  </Section>
                  <Section title="メモ">
                    <Area rows={4} value={scDraft.memo} onChange={v => setScDraft({ ...scDraft, memo: v })} placeholder="プレイ時間、感想、注意事項など…" />
                  </Section>
                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 4 }}>
                    <Btn onClick={() => setScDraft(null)} small>キャンセル</Btn>
                    <Btn color={T.green} border={T.green} onClick={saveScenarioDraft}>保存する</Btn>
                  </div>
                </>
              );
            })()}

            {/* ── 詳細ビュー ── */}
            {!scDraft && scViewId && (() => {
              const sc = scenarios.find(x => x.id === scViewId);
              if (!sc) { setScViewId(null); return null; }
              const statusColor = SCENARIO_STATUS_COLORS[sc.status] || T.dim;
              const relJournals = journal.filter(j => j.scenarioId === sc.id || j.scenario === sc.title);
              return (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 8 }}>
                    <Btn onClick={() => setScViewId(null)} small>← 一覧に戻る</Btn>
                    <div style={{ display: "flex", gap: 8 }}>
                      <Btn small color={T.red} border={T.red} onClick={() => {
                        if (!window.confirm("このシナリオを削除しますか？")) return;
                        persistScenarios(scenarios.filter(x => x.id !== sc.id)); setScViewId(null);
                      }}>削除</Btn>
                      <Btn color={T.gold} border={T.gold} onClick={() => { setScDraft({ ...sc, tags: sc.tags || [] }); window.scrollTo({ top: 0, behavior: "smooth" }); }}>✎ 編集</Btn>
                    </div>
                  </div>
                  <div style={{ background: "#ffffff", border: "1px solid #e2ddd8", borderLeft: `4px solid ${statusColor}`, borderRadius: 4, padding: "18px 20px", marginBottom: 16 }}>
                    <div style={{ fontFamily: serif, fontSize: 22, fontWeight: "bold", color: "#1a1a1a", marginBottom: 6 }}>{sc.title}</div>
                    {sc.author && <div style={{ fontFamily: serif, fontSize: 14, color: "#666", marginBottom: 10 }}>by {sc.author}</div>}
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 12 }}>
                      <span style={{ fontFamily: mono, fontSize: 10, color: statusColor, border: `1px solid ${statusColor}66`, background: statusColor + "18", borderRadius: 10, padding: "2px 9px" }}>{sc.status}</span>
                      {sc.edition && <span style={{ fontFamily: mono, fontSize: 10, color: "#777", border: "1px solid #ddd", background: "#f5f3ef", borderRadius: 10, padding: "2px 9px" }}>{sc.edition === "6e" ? "CoC6版" : sc.edition === "7e" ? "CoC7版" : sc.edition}</span>}
                      {(sc.tags || []).map((tag, ti) => (
                        <span key={ti} style={{ fontFamily: mono, fontSize: 10, color: "#666", border: "1px solid #ddd", background: "#f0ede8", borderRadius: 10, padding: "2px 9px" }}>#{tag}</span>
                      ))}
                    </div>
                    {sc.url && <div style={{ marginBottom: 10 }}><a href={sc.url} target="_blank" rel="noreferrer" style={{ fontFamily: mono, fontSize: 12, color: "#2a7a4f", textDecoration: "none" }}>{sc.url.replace(/^https?:\/\//, "").slice(0, 60)} ↗</a></div>}
                    {sc.memo && <div style={{ fontFamily: serif, fontSize: 14, color: "#333", lineHeight: 1.8, whiteSpace: "pre-wrap", borderTop: "1px solid #eee", paddingTop: 12 }}>{sc.memo}</div>}
                  </div>
                  {relJournals.length > 0 && (
                    <Section title="関連セッション日誌">
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                        {relJournals.map(j => {
                          const ch = charById(j.characterId);
                          return (
                            <span key={j.id} onClick={() => { setJournalFocusId(j.id); setView("journal"); }}
                              style={{ fontFamily: serif, fontSize: 13, color: T.green, cursor: "pointer", textDecoration: "underline" }}>
                              {j.date || "日付不明"}{ch ? ` (${ch.name})` : ""}
                            </span>
                          );
                        })}
                      </div>
                    </Section>
                  )}
                  {(() => {
                    const linkedGm = gmSessions.filter(s => s.scenarioId === sc.id);
                    const linkedEvents = events.filter(ev => ev.scenarioId === sc.id && ev.cat === "TRPG");
                    if (!linkedGm.length && !linkedEvents.length) return null;
                    return (
                      <>
                        {linkedGm.length > 0 && (
                          <Section title="関連GMシート">
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              {linkedGm.map(s => (
                                <div key={s.id} onClick={() => { setGmViewId(s.id); setView("gm"); window.scrollTo({ top: 0, behavior: "smooth" }); }}
                                  style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "7px 10px", background: "#ffffff", border: "1px solid #e2ddd8", borderRadius: 6 }}>
                                  <span style={{ fontFamily: serif, fontSize: 13, color: T.text, flex: 1 }}>{s.title || "無題"}</span>
                                  {s.date && <span style={{ fontFamily: mono, fontSize: 11, color: T.dim }}>{s.date}</span>}
                                  {s.status && <span style={{ fontFamily: mono, fontSize: 10, color: T.gold, border: `1px solid ${T.gold}`, borderRadius: 8, padding: "1px 7px" }}>{s.status}</span>}
                                </div>
                              ))}
                            </div>
                          </Section>
                        )}
                        {linkedEvents.length > 0 && (
                          <Section title="関連TRPG予定">
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                              {linkedEvents.map(ev => (
                                <div key={ev.id} onClick={() => { setView("calendar"); window.scrollTo({ top: 0, behavior: "smooth" }); }}
                                  style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "7px 10px", background: "#ffffff", border: "1px solid #e2ddd8", borderRadius: 6 }}>
                                  {ev.date && <span style={{ fontFamily: mono, fontSize: 11, color: T.dim, flexShrink: 0 }}>{ev.date}</span>}
                                  {ev.role && <span style={{ fontFamily: mono, fontSize: 10, color: T.green, border: `1px solid ${T.green}`, borderRadius: 8, padding: "1px 7px", flexShrink: 0 }}>{ev.role}</span>}
                                  <span style={{ fontFamily: serif, fontSize: 13, color: T.text, flex: 1 }}>{ev.title || "無題"}</span>
                                </div>
                              ))}
                            </div>
                          </Section>
                        )}
                      </>
                    );
                  })()}
                </>
              );
            })()}

            {/* ── 一覧 ── */}
            {!scDraft && !scViewId && (() => {
              const scFiltered = scenarios
                .filter(sc => !scFilter || sc.status === scFilter)
                .filter(sc => {
                  if (!scSearch.trim()) return true;
                  const q = scSearch.trim().toLowerCase();
                  return [sc.title, sc.author, sc.memo, ...(sc.tags || [])].some(f => (f || "").toLowerCase().includes(q));
                });
              return (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
                    <div style={{ fontFamily: serif, fontSize: 22 }}>シナリオ管理 <span style={{ fontFamily: mono, fontSize: 12, color: T.dim }}>{scenarios.length} 件</span></div>
                    <Btn color={T.green} border={T.green} onClick={() => { setScDraft(blankScenario()); window.scrollTo({ top: 0, behavior: "smooth" }); }}>+ 追加</Btn>
                  </div>
                  <div style={{ marginBottom: 10, display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
                    <span onClick={() => setScFilter("")}
                      style={{ cursor: "pointer", fontFamily: mono, fontSize: 11, padding: "3px 10px", borderRadius: 10, border: `1px solid ${scFilter === "" ? T.gold : T.line}`, color: scFilter === "" ? T.gold : T.dim }}>
                      すべて ({scenarios.length})
                    </span>
                    {SCENARIO_STATUSES.map(s => {
                      const n = scenarios.filter(x => x.status === s).length;
                      return (
                        <span key={s} onClick={() => setScFilter(scFilter === s ? "" : s)}
                          style={{ cursor: "pointer", fontFamily: mono, fontSize: 11, padding: "3px 10px", borderRadius: 10, border: `1px solid ${scFilter === s ? SCENARIO_STATUS_COLORS[s] : T.line}`, color: scFilter === s ? SCENARIO_STATUS_COLORS[s] : T.dim }}>
                          {s} ({n})
                        </span>
                      );
                    })}
                  </div>
                  {scenarios.length > 0 && (
                    <input placeholder="🔍 タイトル・著者・タグで検索…"
                      value={scSearch} onChange={e => setScSearch(e.target.value)}
                      style={{ ...inputStyle, width: "100%", marginBottom: 12, boxSizing: "border-box" }} />
                  )}
                  {scenarios.length === 0 && (
                    <div style={{ border: `1px dashed ${T.line}`, padding: 40, textAlign: "center", color: T.dim, fontFamily: serif, background: T.panel }}>
                      まだ登録がありません。「+ 追加」からシナリオを登録しましょう。
                    </div>
                  )}
                  {scFiltered.length === 0 && scenarios.length > 0 && (
                    <div style={{ fontFamily: serif, fontSize: 13, color: T.dim, textAlign: "center", padding: "28px 0" }}>条件に一致するシナリオはありません</div>
                  )}
                  <div style={{ display: "grid", gap: 8 }}>
                    {scFiltered.map(sc => {
                      const statusColor = SCENARIO_STATUS_COLORS[sc.status] || T.dim;
                      return (
                        <div key={sc.id} onClick={() => { setScViewId(sc.id); window.scrollTo({ top: 0, behavior: "smooth" }); }}
                          style={{ background: "#ffffff", border: "1px solid #e2ddd8", borderLeft: `4px solid ${statusColor}`, borderRadius: 4, padding: "12px 16px", cursor: "pointer" }}>
                          <div style={{ fontFamily: serif, fontSize: 15, fontWeight: "bold", color: "#1a1a1a", marginBottom: 7 }}>{sc.title || "無題のシナリオ"}</div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                            <span style={{ fontFamily: mono, fontSize: 10, color: statusColor, border: `1px solid ${statusColor}66`, background: statusColor + "18", borderRadius: 10, padding: "1px 8px" }}>{sc.status}</span>
                            {sc.edition && <span style={{ fontFamily: mono, fontSize: 10, color: "#777", border: "1px solid #ddd", background: "#f5f3ef", borderRadius: 10, padding: "1px 8px" }}>{sc.edition === "6e" ? "CoC6版" : sc.edition === "7e" ? "CoC7版" : sc.edition}</span>}
                            {(sc.tags || []).map((tag, ti) => (
                              <span key={ti} style={{ fontFamily: mono, fontSize: 10, color: "#666", border: "1px solid #ddd", background: "#f0ede8", borderRadius: 10, padding: "1px 8px" }}>#{tag}</span>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}
          </div>
        )}

        {/* ===== TODO リスト ===== */}
        {view === "todo" && (() => {
          const lvInfo = getTodoLevelInfo(todoStats.totalPoints || 0);
          const addTodo = () => {
            if (!todoDraftTitle.trim()) return;
            persistTodos([{ ...blankTodo(todoDraftCat), title: todoDraftTitle.trim() }, ...todos]);
            setTodoDraftTitle("");
          };
          const toggleTodo = (id) => {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            const completing = !todo.done;
            persistTodos(todos.map(t => t.id === id ? { ...t, done: !t.done, doneAt: !t.done ? new Date().toISOString() : null } : t));
            if (completing) {
              const pts = 10;
              const oldLv = getTodoLevelInfo(todoStats.totalPoints || 0).lv;
              const newTotal = (todoStats.totalPoints || 0) + pts;
              const newStats = { ...todoStats, totalPoints: newTotal };
              const newLvInfo = getTodoLevelInfo(newTotal);
              persistTodoStats(newStats);
              setTodoPointPop({ pts, lvUp: newLvInfo.lv > oldLv, lvLabel: newLvInfo.label });
              setTimeout(() => setTodoPointPop(null), 2500);
            }
          };
          const deleteTodo = (id) => persistTodos(todos.filter(t => t.id !== id));
          const doneCount = todos.filter(t => t.done).length;
          const filtered = todos.filter(t => {
            if (!todoShowDone && t.done) return false;
            if (todoCatFilter !== "all" && t.category !== todoCatFilter) return false;
            return true;
          });
          return (
            <div style={{ position: "relative" }}>
              {/* ポイントポップアップ */}
              {todoPointPop && (
                <div style={{ position: "fixed", top: "38%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 9999, textAlign: "center", pointerEvents: "none", animation: "todoFadeUp 2.5s forwards" }}>
                  <div style={{ fontFamily: mono, fontSize: 36, color: T.gold, fontWeight: "bold", textShadow: "0 2px 12px rgba(0,0,0,0.25)" }}>+{todoPointPop.pts} pt</div>
                  {todoPointPop.lvUp && (
                    <div style={{ fontFamily: serif, fontSize: 17, color: "#2E8B57", marginTop: 8, fontWeight: "bold" }}>⬆ Lv UP！{todoPointPop.lvLabel}</div>
                  )}
                </div>
              )}

              {/* レベル表示 */}
              <div style={{ background: T.cardBg, border: `1px solid ${T.line}`, borderLeft: `4px solid ${T.gold}`, borderRadius: 4, padding: "12px 16px", marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div>
                    <span style={{ fontFamily: mono, fontSize: 11, color: T.gold, letterSpacing: 1 }}>Lv.{lvInfo.lv}</span>
                    <span style={{ fontFamily: serif, fontSize: 15, fontWeight: "bold", color: T.text, marginLeft: 8 }}>{lvInfo.label}</span>
                  </div>

                <select value={todoDraftCat} onChange={e => setTodoDraftCat(e.target.value)} style={{ ...inputStyle, width: "auto" }}>

                  <label style={{ fontFamily: mono, fontSize: 10, color: T.dim, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>

                  </label>
                  {doneCount > 0 && (
                    <Btn small color={T.dim} border={T.line} onClick={() => persistTodos(todos.filter(t => !t.done))}>完了済みを削除 ({doneCount})</Btn>

              </div>

              {/* TODOリスト */}
              {filtered.length === 0 && (
                <div style={{ fontFamily: serif, fontSize: 13, color: T.dim, textAlign: "center", padding: "40px 0", fontStyle: "italic" }}>TODOはありません</div>

                <div key={todo.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", marginBottom: 6, background: todo.done ? "transparent" : T.cardBg, border: `1px solid ${T.line}`, borderLeft: `3px solid ${TODO_CAT_COLORS[todo.category] || T.dim}`, borderRadius: 4, opacity: todo.done ? 0.5 : 1, transition: "opacity 0.2s" }}>

                </div>
              ))}
            </div>
          );
        })()}

        {/* ===== セッションプラン ===== */}
        {view === "plan" && (
          <div>
            {!planDraft ? (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>

                  <Btn color={T.green} border={T.green} onClick={() => { setPlanDraft(blankPlan()); window.scrollTo({ top: 0, behavior: "smooth" }); }}>+ 追加</Btn>
                </div>
                <div style={{ fontFamily: serif, fontSize: 13, color: T.dim, marginBottom: 14, lineHeight: 1.7 }}>
                  確定していないが一緒に遊ぶ予定のシナリオ・メンバーのメモ
                </div>
                {plans.length > 0 && (
                  <input
                    placeholder="🔍 シナリオ・メンバー・メモで検索…"
                    value={planSearch}
                    onChange={e => setPlanSearch(e.target.value)}
                    style={{ ...inputStyle, width: "100%", marginBottom: 12, boxSizing: "border-box" }}
                  />
                )}
                {plans.length === 0 && (
                  <div style={{ fontFamily: serif, fontSize: 14, color: T.dim, textAlign: "center", padding: "48px 0", fontStyle: "italic" }}>プランはありません</div>

                  if (!planSearch.trim()) return true;
                  const q = planSearch.trim().toLowerCase();
                  return [p.scenarioTitle, p.members, p.memo]
                    .some(f => (f || "").toLowerCase().includes(q));

                  <div key={p.id} onClick={() => { setPlanDraft({ ...p }); window.scrollTo({ top: 0, behavior: "smooth" }); }}

                    <div style={{ fontFamily: serif, fontSize: 16, fontWeight: "bold", color: T.text, marginBottom: 4 }}>
                      {p.scenarioTitle || "無題のプラン"}
                    </div>
                    {p.members && (
                      <div style={{ fontFamily: mono, fontSize: 11, color: T.dim, marginBottom: 4 }}>👥 {p.members}</div>
                    )}
                    {p.memo && (
                      <div style={{ fontFamily: serif, fontSize: 12, color: T.dim, whiteSpace: "pre-wrap", overflow: "hidden", maxHeight: 48, lineHeight: 1.6 }}>{p.memo}</div>
                    )}
                    {p.scenarioUrl && (
                      <a href={p.scenarioUrl} target="_blank" rel="noreferrer" onClick={e => e.stopPropagation()}
                        style={{ fontFamily: mono, fontSize: 10, color: T.green, textDecoration: "none", marginTop: 6, display: "inline-block" }}>リンク ↗</a>
                    )}
                  </div>
                ))}
              </>
            ) : (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 8 }}>

                  <div style={{ display: "flex", gap: 8 }}>
                    {plans.some(p => p.id === planDraft.id) && (

                  </div>

                  const q = gmSearch.trim().toLowerCase();
                  const plNames = (s.players || []).map(p => p.plName || "").join(" ");
                  const charNames = (s.players || []).map(p => p.charName || "").join(" ");

                            <div style={{ fontFamily: serif, fontSize: 16, fontWeight: "bold", color: "#1a1a1a" }}>{s.title || "無題のセッション"}</div>

                          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                            {s.date && <span style={{ fontFamily: mono, fontSize: 10, color: "#8a6a1c", border: "1px solid #c9a84c66", background: "#c9a84c18", borderRadius: 10, padding: "1px 8px" }}>{s.date}</span>}
                            {s.discordUrl && <a href={s.discordUrl} target="_blank" rel="noreferrer" onClick={e => e.stopPropagation()} style={{ fontFamily: mono, fontSize: 10, color: "#5865F2", border: "1px solid #5865F266", borderRadius: 10, padding: "1px 8px", textDecoration: "none" }}>Discord</a>}
                            {s.cocofoliaUrl && <a href={s.cocofoliaUrl} target="_blank" rel="noreferrer" onClick={e => e.stopPropagation()} style={{ fontFamily: mono, fontSize: 10, color: "#2a7a4f", border: "1px solid #4a9a6f66", borderRadius: 10, padding: "1px 8px", textDecoration: "none" }}>ここふぉりあ</a>}
                          </div>

                        {s.scenarioTitle && <div style={{ fontFamily: serif, fontSize: 13, color: "#666", marginTop: 6 }}>📖 {s.scenarioTitle}</div>}
                        {s.players && s.players.length > 0 && (
                          <div style={{ marginTop: 6, display: "flex", gap: 10, flexWrap: "wrap" }}>
                            <span style={{ fontFamily: mono, fontSize: 11, color: "#777" }}>👥 {s.players.map(p => p.plName || "?").join(" / ")}</span>
                            {s.players.some(p => p.charName) && (
                              <span style={{ fontFamily: serif, fontSize: 11, color: "#777" }}>🎭 {s.players.filter(p => p.charName).map(p => p.charName).join(" / ")}</span>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </>
              );
            })()}

            {/* ── 閲覧 ── */}
            {!gmDraft && gmViewId && (() => {

                    <div style={{ display: "flex", gap: 8 }}>
                      <Btn small color={T.red} border={T.red} onClick={() => { if (window.confirm("削除しますか？")) { persistGmSessions(gmSessions.filter(x => x.id !== s.id)); setGmViewId(null); } }}>削除</Btn>
                      <Btn color={T.gold} border={T.gold} onClick={() => { setGmDraft({ ...s, players: s.players ? s.players.map(p => ({ ...p })) : [] }); window.scrollTo({ top: 0, behavior: "smooth" }); }}>編集</Btn>

                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                      {(() => { const sc = GM_STATUS_COLORS[s.status || "GM予定"]; return <span style={{ fontFamily: mono, fontSize: 11, color: sc, border: `1px solid ${sc}`, borderRadius: 3, padding: "2px 10px" }}>{s.status || "GM予定"}</span>; })()}

            })()}

            {/* ── 編集 ── */}
            {gmDraft && (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 8 }}>
                  <Btn onClick={() => { setGmDraft(null); }} small>← {gmViewId ? "閲覧に戻る" : "一覧に戻る"}</Btn>
                  <div style={{ display: "flex", gap: 8 }}>
                    {gmSessions.some(s => s.id === gmDraft.id) && (
                      <Btn small color={T.red} border={T.red} onClick={() => { if (window.confirm("削除しますか？")) { persistGmSessions(gmSessions.filter(s => s.id !== gmDraft.id)); setGmDraft(null); setGmViewId(null); } }}>削除</Btn>

                            <button key={st} onClick={() => setGmDraft({ ...gmDraft, status: st })}

                      <span style={{ flex: 1, fontFamily: serif, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={name}>{name}</span>
                      <input type="number" value={draft.skills[name]}
                        onChange={(e) => setSkill(name, e.target.value === "" ? 0 : e.target.value)}
                        style={{ width: 48, background: T.panel2, border: `1px solid ${T.gold}`, color: T.gold, fontWeight: 700, fontFamily: mono, fontSize: 13, padding: "2px 4px", borderRadius: 2, outline: "none" }} />
                      <button onClick={() => setSkill(name, "")} title="削除"
                        style={{ background: "transparent", border: "none", color: T.red, cursor: "pointer", fontFamily: mono }}>×</button>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <input value={newSkill.name} placeholder="技能名"
                    onChange={(e) => setNewSkill({ ...newSkill, name: e.target.value })}
                    style={{ ...inputStyle, width: 200, fontSize: 13, padding: "5px 8px" }} />
                  <input type="number" value={newSkill.value} placeholder="値"
                    onChange={(e) => setNewSkill({ ...newSkill, value: e.target.value })}
                    style={{ ...inputStyle, width: 70, fontFamily: mono, fontSize: 13, padding: "5px 8px" }} />
                  <Btn small onClick={() => {
                    const n = normName(newSkill.name);
                    if (!n) return;
                    setSkill(n, num(newSkill.value));
                    setNewSkill({ name: "", value: "" });
                  }}>+ 追加</Btn>
                </div>
              </div>
            </Section>

            <Section title="プロフィール帳 PERSONAL FILE">
              <div style={{ display: "grid", gap: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  <Field label="身長" value={draft.profile.height} onChange={(v) => setProf("height", v)} placeholder="172cm" />
                  <Field label="体重" value={draft.profile.weight} onChange={(v) => setProf("weight", v)} placeholder="60kg" />
                  <Field label="髪" value={draft.profile.hair} onChange={(v) => setProf("hair", v)} placeholder="黒・癖毛" />
                  <Field label="瞳" value={draft.profile.eyes} onChange={(v) => setProf("eyes", v)} placeholder="焦げ茶" />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 12 }}>
                  <Field label="一人称" value={draft.profile.firstPerson} onChange={(v) => setProf("firstPerson", v)} placeholder="僕 / 私 / 俺" />
                  <Field label="口調・話し方" value={draft.profile.speech} onChange={(v) => setProf("speech", v)} placeholder="丁寧語。緊張すると早口になる" />
                </div>
                <Area label="性格 PERSONALITY" value={draft.profile.personality} onChange={(v) => setProf("personality", v)} rows={2} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Area label="好きなもの" value={draft.profile.likes} onChange={(v) => setProf("likes", v)} rows={2} />
                  <Area label="嫌いなもの・苦手" value={draft.profile.dislikes} onChange={(v) => setProf("dislikes", v)} rows={2} />
                </div>
                <Area label="信念・目標 BELIEF" value={draft.profile.belief} onChange={(v) => setProf("belief", v)} rows={2} />
                <Area label="交友関係・大切な人 RELATIONS" value={draft.profile.relations} onChange={(v) => setProf("relations", v)} rows={2} />
                <Area label="来歴・バックストーリー BACKSTORY" rows={6} value={draft.backstory}
                  onChange={(v) => setDraft({ ...draft, backstory: v })}
                  placeholder="生い立ち、探索者になった経緯、恐怖の体験など…" />
                <Area label="所持品・財産 ITEMS" rows={3} value={draft.items} onChange={(v) => setDraft({ ...draft, items: v })} />
                <Area label="メモ NOTES" rows={3} value={draft.memo} onChange={(v) => setDraft({ ...draft, memo: v })} />
              </div>
            </Section>

            <Section title="関係者 CONTACTS(同卓した探索者など)">
              <div style={{ display: "grid", gap: 8, marginBottom: 12 }}>
                {draft.contacts.length === 0 && (
                  <div style={{ fontFamily: serif, fontSize: 13, color: T.dim }}>まだ記録がありません。</div>
                )}
                {draft.contacts.map((p) => (
                  <div key={p.id} style={{
                    display: "flex", gap: 10, alignItems: "baseline", flexWrap: "wrap",
                    background: T.panel2, border: `1px solid ${T.line}`, padding: "8px 10px", borderRadius: 2,
                  }}>
                    <span style={{ fontFamily: serif, fontSize: 15 }}>{p.name}</span>
                    <span style={{ fontFamily: serif, fontSize: 13, color: T.dim, flex: 1, minWidth: 120 }}>{p.note}</span>
                    {p.url && (
                      <a href={p.url} target="_blank" rel="noreferrer"
                        style={{ fontFamily: mono, fontSize: 11, color: T.green, textDecoration: "none" }}>
                        キャラシ ↗
                      </a>
                    )}
                    <button title="削除"
                      onClick={() => setDraft({ ...draft, contacts: draft.contacts.filter((x) => x.id !== p.id) })}
                      style={{ background: "transparent", border: "none", color: T.red, cursor: "pointer", fontFamily: mono }}>×</button>
                  </div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr 2fr auto", gap: 8, alignItems: "end" }}>
                <Field label="名前" value={newContact.name} onChange={(v) => setNewContact({ ...newContact, name: v })} />
                <Field label="メモ(関係・印象など)" value={newContact.note} onChange={(v) => setNewContact({ ...newContact, note: v })} />
                <Field label="URL(いあきゃら等)" value={newContact.url} onChange={(v) => setNewContact({ ...newContact, url: v })} />
                <Btn small onClick={() => {
                  if (!newContact.name.trim()) return;
                  setDraft({ ...draft, contacts: [...draft.contacts, { id: "c" + Date.now().toString(36), ...newContact }] });
                  setNewContact({ name: "", note: "", url: "" });
                }}>+ 追加</Btn>
              </div>
            </Section>

            <Section title="セッション記録 SESSION LOG"
              right={
                <Btn small color={T.gold} border={T.gold}
                  onClick={() => { setJDraft({ ...blankJournalEntry(), characterId: draft.id }); setView("journal"); }}>
                  📔 日誌を書く
                </Btn>
              }>
              {journal.filter((j) => j.characterId === draft.id).length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontFamily: mono, fontSize: 10, color: T.gold, letterSpacing: 1, marginBottom: 6 }}>📔 日誌のある記録</div>
                  <div style={{ display: "grid", gap: 4 }}>
                    {journal.filter((j) => j.characterId === draft.id)
                      .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))
                      .map((j) => (
                        <div key={j.id} style={{ display: "flex", gap: 14, alignItems: "baseline", borderBottom: `1px dashed ${T.line}`, padding: "5px 0" }}>
                          <span style={{ fontFamily: mono, fontSize: 12, color: T.dim, minWidth: 96 }}>{j.date || "日付不明"}</span>
                          <span style={{ fontFamily: serif, fontSize: 14, flex: 1 }}>
                            {j.scenario}
                            {j.ending && <span style={{ color: T.dim, fontSize: 12 }}> — {j.ending.length > 24 ? j.ending.slice(0, 24) + "…" : j.ending}</span>}
                          </span>
                          <span onClick={() => { setJournalFocusId(j.id); setView("journal"); }}
                            style={{ fontFamily: serif, fontSize: 12, color: T.green, cursor: "pointer", textDecoration: "underline" }}>
                            📔 日誌を開く
                          </span>
                        </div>
                      ))}
                  </div>
                  <div style={{ fontFamily: mono, fontSize: 10, color: T.dim, letterSpacing: 1, margin: "12px 0 0" }}>簡易記録</div>
                </div>
              )}
              <div style={{ display: "grid", gap: 4, marginBottom: 12 }}>
                {draft.sessions.length === 0 && (
                  <div style={{ fontFamily: serif, fontSize: 13, color: T.dim }}>まだ記録がありません。</div>
                )}
                {[...draft.sessions]
                  .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))
                  .map((s) => (
                    <div key={s.id} style={{ display: "flex", gap: 14, alignItems: "baseline", borderBottom: `1px dashed ${T.line}`, padding: "5px 0" }}>
                      <span style={{ fontFamily: mono, fontSize: 12, color: T.dim, minWidth: 96 }}>{s.date || "日付不明"}</span>
                      <span style={{ fontFamily: serif, fontSize: 14, flex: 1 }}>{s.scenario}</span>
                      <button title="削除"
                        onClick={() => setDraft({ ...draft, sessions: draft.sessions.filter((x) => x.id !== s.id) })}
                        style={{ background: "transparent", border: "none", color: T.red, cursor: "pointer", fontFamily: mono }}>×</button>
                    </div>
                  ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 8, alignItems: "end" }}>
                <div>
                  <Label>日付</Label>
                  <input type="date" value={newSession.date}
                    onChange={(e) => setNewSession({ ...newSession, date: e.target.value })}
                    style={{ ...inputStyle, fontFamily: mono }} />
                </div>
                <Field label="シナリオ名" value={newSession.scenario} onChange={(v) => setNewSession({ ...newSession, scenario: v })} />
                <Btn small onClick={() => {
                  if (!newSession.scenario.trim()) return;
                  setDraft({ ...draft, sessions: [...draft.sessions, { id: "s" + Date.now().toString(36), ...newSession }] });
                  setNewSession({ date: "", scenario: "" });
                }}>+ 追加</Btn>
              </div>
            </Section>

            <div style={{ marginTop: 18, textAlign: "right" }}>
              <Btn small color={T.red} border={T.red} onClick={() => removeCharacter(draft.id)}>
                このファイルを破棄する
              </Btn>
            </div>
          </div>
        )}
      </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
</body>
</html>
