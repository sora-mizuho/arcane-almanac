let _db = null;
function getDB() {
  if (_db) return _db;
  try {
    if (!window.firebase || !firebase.firestore) return null;
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    _db = firebase.firestore();
    return _db;
  } catch (e) { console.error("Firebase初期化に失敗", e); return null; }
}

const SYNC_CODE_KEY = "coc-sync-code";
const cloud = {
  getCode() { return localStorage.getItem(SYNC_CODE_KEY) || ""; },
  setCode(code) {
    if (code) localStorage.setItem(SYNC_CODE_KEY, code);
    else localStorage.removeItem(SYNC_CODE_KEY);
  },
  /* クラウドへ全データを書き込む */
  async push(payload) {
    const db = getDB(); const code = this.getCode();
    if (!db || !code) return false;
    await db.collection("almanac").doc(code).set({
      ...payload, updatedAt: Date.now(),
    });
    return true;
  },
  /* クラウドから全データを読み込む(なければnull) */
  async pull() {
    const db = getDB(); const code = this.getCode();
    if (!db || !code) return null;
    const snap = await db.collection("almanac").doc(code).get();
    return snap.exists ? snap.data() : null;
  },
};

const TODO_LEVELS = [
  { min: 0,    lv: 1, label: "平凡な市民" },
  { min: 100,  lv: 2, label: "見習い探索者" },
  { min: 250,  lv: 3, label: "一人前探索者" },

];
function getTodoLevelInfo(pts) {
  let info = TODO_LEVELS[0];
  for (const l of TODO_LEVELS) { if (pts >= l.min) info = l; }
  const nextIdx = TODO_LEVELS.findIndex(l => l.lv === info.lv + 1);
  const next = nextIdx >= 0 ? TODO_LEVELS[nextIdx] : null;
  const progress = next ? Math.min((pts - info.min) / (next.min - info.min), 1) : 1;
  return { ...info, next, progress, pts };
}

/* 画像バイナリは IndexedDB に保存（localStorageの容量制限を回避） */
const imageDB = (() => {
  let _db = null;
  const open = () => new Promise((res, rej) => {
    if (_db) { res(_db); return; }
    const req = indexedDB.open("coc-gallery-images", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("img");
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = rej;
  });
  const tx = async (mode, fn) => { const d = await open(); return new Promise((res, rej) => { const t = d.transaction("img", mode); const s = t.objectStore("img"); const r = fn(s); r.onsuccess = () => res(r.result); r.onerror = rej; }); };
  return {
    get: (id) => tx("readonly", s => s.get(id)),
    set: (id, data) => tx("readwrite", s => s.put(data, id)),
    del: (id) => tx("readwrite", s => s.delete(id)),
  };
})();

/* 正方形コンテナ(objectFit:cover)での objectPosition を焦点座標から計算 */
const computeObjPos = (thumbX, thumbY, natW, natH) => {
  if (!natW || !natH) return `${thumbX}% ${thumbY}%`;
  // 正方形コンテナ(1x1)に cover で収まる scale
  const scale = Math.max(1 / natW, 1 / natH);
  const rendW = natW * scale, rendH = natH * scale;
  let posX = 50, posY = 50;
  if (rendW > 1.0001) {
    const overflow = rendW - 1;
    posX = Math.max(0, Math.min(100, ((thumbX / 100 * rendW - 0.5) / overflow) * 100));
  }
  if (rendH > 1.0001) {
    const overflow = rendH - 1;
    posY = Math.max(0, Math.min(100, ((thumbY / 100 * rendH - 0.5) / overflow) * 100));
  }
  return `${posX.toFixed(1)}% ${posY.toFixed(1)}%`;
};

/* 画像ファイルをリサイズ＋圧縮して dataURL を返す */
const compressImage = (file, maxPx = 1400, quality = 0.87) => new Promise(resolve => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL("image/jpeg", quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

/* URLの種類に応じたリンク表示ラベルを返す */
function linkLabel(url) {
  const u = String(url).toLowerCase();
  if (/discord\.(gg|com)/.test(u)) return "💬 Discord";
  if (/youtube\.com|youtu\.be/.test(u)) return "▶ YouTube";
  if (/twitch\.tv/.test(u)) return "🎮 Twitch";
  if (/x\.com|twitter\.com/.test(u)) return "✕ ポスト";
  return "リンク ↗";
}

/* XのポストURLを正規化(twitter.com / x.com 両対応) */
function parseXPost(url) {
  const u = String(url).trim();
  const m = u.match(/(?:twitter\.com|x\.com)\/([^/]+)\/status\/(\d+)/);
  if (!m) return null;
  return { user: m[1], statusId: m[2], canonical: `https://x.com/${m[1]}/status/${m[2]}` };
}

/* YouTubeのURLから埋め込み情報を取り出す(動画・再生リスト両対応) */
function parseYouTube(url) {
  const u = String(url).trim();
  let videoId = "", listId = "";
  const list = u.match(/[?&]list=([\w-]+)/);
  if (list) listId = list[1];
  let m = u.match(/[?&]v=([\w-]{11})/) || u.match(/youtu\.be\/([\w-]{11})/) ||
          u.match(/youtube\.com\/embed\/([\w-]{11})/) || u.match(/shorts\/([\w-]{11})/);
  if (m) videoId = m[1];
  if (!videoId && !listId && /^[\w-]{11}$/.test(u)) videoId = u; // 動画IDだけ貼られた場合
  if (!videoId && !listId) return null;
  const embed = listId
    ? `https://www.youtube.com/embed/${videoId || "videoseries"}?list=${listId}`
    : `https://www.youtube.com/embed/${videoId}`;
  const thumb = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : "";
  return { videoId, listId, embed, thumb };
}

const parseYMD = (s) => {
  const [y, m, d] = String(s).split("-").map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
};

/* その予定が指定の日に発生するか(繰り返し対応) */
function eventOccursOn(ev, dt) {
  if (!ev.date) return false;
  const [y, m, d] = ev.date.split("-").map(Number);
  /* 期間(終了日)つきの予定: 開始〜終了の全日に表示(繰り返しなしのみ) */
  if (ev.endDate && (!ev.repeat || ev.repeat === "none")) {
    const s = new Date(y, m - 1, d); s.setHours(0, 0, 0, 0);
    const [y2, m2, d2] = ev.endDate.split("-").map(Number);
    const e = new Date(y2, m2 - 1, d2); e.setHours(0, 0, 0, 0);
    const cur = new Date(dt); cur.setHours(0, 0, 0, 0);
    return cur >= s && cur <= e;
  }
  if (ev.repeat === "weekly") {
    const start = new Date(y, m - 1, d); start.setHours(0, 0, 0, 0);
    const cur = new Date(dt); cur.setHours(0, 0, 0, 0);
    return cur >= start && cur.getDay() === start.getDay();
  }
  if (ev.repeat === "yearly") return dt.getMonth() + 1 === m && dt.getDate() === d;
  return ymdStr(dt) === ev.date;
}

}

/* ---------- 誕生日+予定 → カレンダー連携(.ics) ---------- */
function buildICS(chars, events) {
  const year = new Date().getFullYear();
  const out = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//CoC Character Manager//JP"];
  chars
    .filter((c) => num(c.birthday.month) >= 1 && num(c.birthday.day) >= 1)
    .forEach((c) => {
      const d = `${year}${pad2(num(c.birthday.month))}${pad2(num(c.birthday.day))}`;
      out.push(
        "BEGIN:VEVENT",
        `UID:${c.id}@coc-character-manager`,
        `DTSTART;VALUE=DATE:${d}`,
        "RRULE:FREQ=YEARLY",
        `SUMMARY:🎂 ${(c.name || "探索者")} の誕生日`,
        "END:VEVENT"
      );
    });
  (events || [])
    .filter((ev) => ev.date && ev.title)
    .forEach((ev) => {
      const d = ev.date.replace(/-/g, "");
      out.push("BEGIN:VEVENT", `UID:${ev.id}@coc-character-manager`);
      if (ev.time) out.push(`DTSTART:${d}T${ev.time.replace(":", "")}00`);
      else out.push(`DTSTART;VALUE=DATE:${d}`);
      if (ev.endDate && !ev.time && (!ev.repeat || ev.repeat === "none")) {
        const [ey, em, ed] = ev.endDate.split("-").map(Number);
        const next = new Date(ey, em - 1, ed + 1); // 終日予定のDTENDは翌日指定
        out.push(`DTEND;VALUE=DATE:${next.getFullYear()}${pad2(next.getMonth() + 1)}${pad2(next.getDate())}`);
      }
      if (ev.repeat === "weekly") out.push("RRULE:FREQ=WEEKLY");
      if (ev.repeat === "yearly") out.push("RRULE:FREQ=YEARLY");
      out.push(`SUMMARY:[${ev.cat}] ${ev.title}`, "END:VEVENT");
    });
  out.push("END:VCALENDAR");
  return out.join("\r\n");
}

function googleCalendarUrl(c) {
  const year = new Date().getFullYear();
  const m = num(c.birthday.month), d = num(c.birthday.day);
  const start = new Date(year, m - 1, d);
  const end = new Date(year, m - 1, d + 1);
  const fmt = (dt) => `${dt.getFullYear()}${pad2(dt.getMonth() + 1)}${pad2(dt.getDate())}`;
  const p = new URLSearchParams({
    action: "TEMPLATE",
    text: `🎂 ${(c.name || "探索者")} の誕生日`,
    dates: `${fmt(start)}/${fmt(end)}`,
    recur: "RRULE:FREQ=YEARLY",
  });
  return "https://calendar.google.com/calendar/render?" + p.toString();
}

/* ---------- 複数JSONの切り分け(まとめて読み込み用) ---------- */
function extractJsonObjects(text) {
  const t = text.trim();
  try {
    const parsed = JSON.parse(t);
    return Array.isArray(parsed) ? parsed.map((o) => JSON.stringify(o)) : [t];
  } catch (e) { /* 連続貼り付けの場合は下で切り分ける */ }
  const out = [];
  let depth = 0, start = -1, inStr = false, esc = false;
  for (let i = 0; i < t.length; i++) {
    const ch = t[i];
    if (inStr) {
      if (esc) esc = false;
      else if (ch === "\\") esc = true;
      else if (ch === '"') inStr = false;
      continue;
    }
    if (ch === '"') { inStr = true; continue; }
    if (ch === "{") { if (depth === 0) start = i; depth++; }
    else if (ch === "}") {
      depth--;
      if (depth === 0 && start >= 0) { out.push(t.slice(start, i + 1)); start = -1; }
    }
  }
  return out;
}

/* ---------- ココフォリア形式の入出力 ---------- */
function importCocofolia(text, base) {
  const json = JSON.parse(text);
  const data = json.kind === "character" ? json.data : json;
  const c = normalizeCharacter({ ...base });

  if (data.name) c.name = data.name;
  if (data.iconUrl) c.iconUrl = data.iconUrl;
  if (data.externalUrl) c.externalUrl = data.externalUrl;
  if (data.color) c.color = data.color;

  (data.params || []).forEach((p) => {
    const k = String(p.label).toUpperCase();
    if (/^[A-Z]{2,4}$/.test(k)) c.abilities[k] = String(num(p.value));
  });
  /* 7版の見分け: LUKパラメータがある、またはコマンドがCC<=形式 */
  const hasLuk = (data.params || []).some((p) => String(p.label).toUpperCase() === "LUK");
  if (hasLuk || /^\s*CC<=/m.test(String(data.commands || ""))) c.edition = "7e";
  (data.status || []).forEach((s) => {
    const k = String(s.label).toUpperCase();
    if (k in c.current) c.current[k] = String(num(s.value));
  });

  const skipNames = new Set(["アイデア", "幸運", "知識", "正気度ロール"]);
  const skills = {};
  for (const line of String(data.commands || "").split("\n")) {
    const m = line.match(/^\s*CCB?<=(\d+)\s*【(.+?)】/);
    if (!m) continue;
    const name = normName(m[2]);
    if (skipNames.has(name)) continue;
    if (/^(STR|CON|POW|DEX|APP|SIZ|INT|EDU)\s*[×xX*]\s*5$/i.test(name)) continue;
    skills[name] = num(m[1]);
  }
  c.skills = skills;
  return c;
}

function exportCocofolia(c, rs) {
  const dv = Object.fromEntries(rs.derive(c.abilities).map((d) => [d.key, d.value]));
  const cur = (k) => (c.current[k] !== "" ? num(c.current[k]) : dv[k]);
  const dbSuffix = dv.DB === "±0" ? "" : dv.DB;
  const is7e = c.edition === "7e";
  const pfx = is7e ? "CC" : "CCB";

  const lines = ["1d100<={SAN} 【正気度ロール】"];
  if (dv.IDEA !== undefined) lines.push(`${pfx}<=${dv.IDEA} 【アイデア】`);
  if (is7e) lines.push(`${pfx}<={LUK} 【幸運】`);
  else if (dv.LUCK !== undefined) lines.push(`${pfx}<=${dv.LUCK} 【幸運】`);
  if (dv.KNOW !== undefined) lines.push(`${pfx}<=${dv.KNOW} 【知識】`);
  rs.skillCategories.forEach((cat) =>
    cat.skills.forEach((s) => {
      const name = normName(s.n);
      lines.push(`${pfx}<=${c.skills[name] ?? skillInit(s, c.abilities)} 【${name}】`);
    })
  );
  const master = new Set(masterSkillNames(rs));
  Object.entries(c.skills).forEach(([name, value]) => {
    if (!master.has(name)) lines.push(`${pfx}<=${value} 【${name}】`);
  });
  ["1d3", "1d4", "1d6"].forEach((b) => lines.push(`${b}${dbSuffix} 【ダメージ判定】`));
  const abilityKeys = is7e
    ? ["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU", "LUK"]
    : ["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"];
  abilityKeys.forEach((k) =>
    lines.push(is7e ? `CC<={${k}} 【${k}】` : `CCB<={${k}}*5 【${k} × 5】`)
  );

  return JSON.stringify({
    kind: "character",
    data: {
      name: c.name,
      initiative: num(c.abilities.DEX),
      externalUrl: c.externalUrl || "",
      iconUrl: c.iconUrl || "",
      commands: lines.join("\n") + "\n",
      status: [
        { label: "HP", value: cur("HP"), max: dv.HP },
        { label: "MP", value: cur("MP"), max: dv.MP },
        { label: "SAN", value: cur("SAN"), max: dv.SAN },
      ],
      params: (is7e
        ? ["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU", "LUK"]
        : ["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"])
        .map((k) => ({ label: k, value: String(num(c.abilities[k])) })),
      color: c.color || "#ffd900",
    },
  });
}

/* Xのポストを埋め込み表示(widgets.jsで描画) */
function XEmbed({ post }) {
  const ref = useRef(null);
  useEffect(() => {
    let cancelled = false;
    const render = () => {
      if (cancelled || !ref.current) return;
      if (window.twttr && window.twttr.widgets) {
        ref.current.innerHTML = "";
        window.twttr.widgets.createTweet(post.statusId, ref.current, { theme: "light", conversation: "none", align: "center" }).catch(() => {});
      } else {
        setTimeout(render, 400); // widgets.js 読み込み待ち
      }
    };
    render();
    return () => { cancelled = true; };
  }, [post.statusId]);
  return <div ref={ref} style={{ minHeight: 80 }} />;
}

/* ギャラリーサムネイル（IntersectionObserver で遅延読み込み） */
function GalleryThumb({ imgId, thumbX = 50, thumbY = 30, count }) {
  const [src, setSrc] = React.useState(() => _imgCache.get(imgId) || null);
  const [natSize, setNatSize] = React.useState(null);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (src || !imgId) return;
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting) return;
      obs.disconnect();
      loadCachedImage(imgId).then(d => { if (d) setSrc(d); });
    }, { rootMargin: "200px" });
    obs.observe(el);
    return () => obs.disconnect();
  }, [imgId]);
  const objPos = React.useMemo(
    () => natSize ? computeObjPos(thumbX, thumbY, natSize.w, natSize.h) : `${thumbX}% ${thumbY}%`,
    [thumbX, thumbY, natSize]
  );
  return (
    <div ref={ref} style={{ position: "absolute", inset: 0, background: T.bg }}>
      {src
        ? <img src={src} alt=""
            onLoad={e => setNatSize({ w: e.target.naturalWidth, h: e.target.naturalHeight })}
            style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: objPos }} />
        : <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: T.dim, fontFamily: mono, fontSize: 26 }}>🖼</div>
      }
      {count > 1 && <div style={{ position: "absolute", bottom: 5, right: 5, background: "rgba(0,0,0,0.55)", color: "#fff", fontFamily: mono, fontSize: 10, padding: "2px 6px", borderRadius: 2 }}>+{count - 1}</div>}
    </div>
  );
}

/* 編集フォーム内のサムネイルプレビュー */
function ThumbPreview({ src, thumbX = 50, thumbY = 30, size = 52 }) {
  const imgRef = React.useRef(null);
  const [objPos, setObjPos] = React.useState("50% 50%");
  const recompute = React.useCallback(() => {
    const el = imgRef.current;
    if (!el || !el.naturalWidth) return;
    setObjPos(computeObjPos(thumbX, thumbY, el.naturalWidth, el.naturalHeight));
  }, [thumbX, thumbY]);
  React.useEffect(() => { recompute(); }, [recompute]);
  return (
    <div style={{ width: size, height: size, flexShrink: 0, overflow: "hidden", borderRadius: 3, border: `1px solid ${T.line}`, background: T.bg }}>
      {src && <img ref={imgRef} src={src} alt="" onLoad={recompute}
        style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: objPos }} />}
    </div>
  );
}

        if (Array.isArray(data.scenarios)) { setScenarios(data.scenarios); scenarioStore.save(data.scenarios); }
        if (Array.isArray(data.todos)) { setTodos(data.todos); todoStore.save(data.todos); }
        if (data.todoStats) { const s = { totalPoints: 0, ...data.todoStats }; setTodoStats(s); todoStatsStore.save(s); }
        if (Array.isArray(data.gmSessions)) { setGmSessions(data.gmSessions); gmStore.save(data.gmSessions); }
        if (Array.isArray(data.plans)) { setPlans(data.plans); planStore.save(data.plans); }
        if (data.health && typeof data.health === "object" && !Array.isArray(data.health)) { setHealth(data.health); healthStore.save(data.health); }
        if (Array.isArray(data.netas)) { setNetas(data.netas); netaStore.save(data.netas); }
        if (Array.isArray(data.illusts)) { setIllusts(data.illusts); illustStore.save(data.illusts); }
      }
      setSyncStatus("ok");
      hydratedRef.current = true;
    }).catch((e) => {
      console.error(e);
      if (!cancelled) { setSyncStatus("error"); hydratedRef.current = true; }
    });
    return () => { cancelled = true; };
  }, [syncCode]);

  /* データ変更時: 少し待ってからクラウドへ書き込み(デバウンス) */
  useEffect(() => {
    if (!syncCode || !hydratedRef.current) return;
    if (pushTimer.current) clearTimeout(pushTimer.current);
    setSyncStatus("syncing");
    pushTimer.current = setTimeout(() => {
      cloud.push({ characters, events, journal, watch, posts, memos, scenarios, todos, todoStats, gmSessions, plans, health, netas, illusts })
        .then((ok) => setSyncStatus(ok ? "ok" : "error"))
        .catch((e) => { console.error(e); setSyncStatus("error"); });
    }, 1200);
    return () => { if (pushTimer.current) clearTimeout(pushTimer.current); };
  }, [characters, events, journal, watch, posts, memos, scenarios, todos, todoStats, gmSessions, plans, health, netas, illusts, syncCode]);

  const applySyncCode = (code) => {
    const c = code.trim();
    cloud.setCode(c);
    setSyncCode(c);
  };
  const manualPull = () => {
    if (!syncCode) return;
    setSyncStatus("syncing");
    cloud.pull().then((data) => {
      if (data) {
        if (Array.isArray(data.characters)) { const v = data.characters.map(normalizeCharacter); setCharacters(v); store.save(v); }
        if (Array.isArray(data.events)) { setEvents(data.events); eventStore.save(data.events); }
        if (Array.isArray(data.journal)) { setJournal(data.journal); journalStore.save(data.journal); }
        if (Array.isArray(data.watch)) { setWatch(data.watch); watchStore.save(data.watch); }
        if (Array.isArray(data.posts)) { setPosts(data.posts); postStore.save(data.posts); }
        if (Array.isArray(data.memos)) { setMemos(data.memos); memoStore.save(data.memos); }
        if (Array.isArray(data.scenarios)) { setScenarios(data.scenarios); scenarioStore.save(data.scenarios); }
        if (Array.isArray(data.todos)) { setTodos(data.todos); todoStore.save(data.todos); }
        if (data.todoStats) { const s = { totalPoints: 0, ...data.todoStats }; setTodoStats(s); todoStatsStore.save(s); }
        if (Array.isArray(data.gmSessions)) { setGmSessions(data.gmSessions); gmStore.save(data.gmSessions); }
        if (Array.isArray(data.plans)) { setPlans(data.plans); planStore.save(data.plans); }
        if (data.health && typeof data.health === "object" && !Array.isArray(data.health)) { setHealth(data.health); healthStore.save(data.health); }
        if (Array.isArray(data.netas)) { setNetas(data.netas); netaStore.save(data.netas); }
        if (Array.isArray(data.illusts)) { setIllusts(data.illusts); illustStore.save(data.illusts); }
        setSyncStatus("ok");
      } else { setSyncStatus("ok"); }
    }).catch((e) => { console.error(e); setSyncStatus("error"); });
  };

  const openNew = (withImport = false) => {
    setDraft(blankCharacter());
    setIoOpen(withImport); setIoText(""); setIoMsg("");
    setView("edit");
  };
  const openEdit = (c) => {
    setDraft(normalizeCharacter(JSON.parse(JSON.stringify(c))));
    setIoOpen(false); setIoText(""); setIoMsg("");
    setView("edit");
  };

  const openView = (c) => {
    if (!c) return;
    setCharViewId(c.id);
    setView("char");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const saveDraft = () => {
    const d = { ...draft, updatedAt: Date.now() };
    const exists = characters.some((c) => c.id === d.id);
    persist(exists ? characters.map((c) => (c.id === d.id ? d : c)) : [d, ...characters]);
    setDraft(d);
    setSavedFlash(true);
    setTimeout(() => setSavedFlash(false), 1500);
  };

  const removeCharacter = (id) => {
    if (!confirm("このファイルを破棄します。よろしいですか?")) return;
    persist(characters.filter((c) => c.id !== id));
    setView("list");
  };

  /* バックアップ(探索者・予定・日誌をまとめて保存/復元) */
  const exportBackup = () => {
    const stamp = new Date().toISOString().slice(0, 10).replace(/-/g, "");
    download(`coc-backup-${stamp}.json`,
      JSON.stringify({ characters, events, journal, watch, posts }, null, 2), "application/json");
    setListMsg("バックアップファイルをダウンロードしました(探索者・予定・日誌を含みます)。");
  };
  const importBackup = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        /* 旧形式(探索者の配列のみ)と新形式(オブジェクト)の両対応 */
        const chars = (Array.isArray(data) ? data : data.characters || []).map(normalizeCharacter);
        const mergeById = (cur, add) => {
          const map = new Map(cur.map((x) => [x.id, x]));
          add.forEach((x) => map.set(x.id, x));
          return Array.from(map.values());
        };
        persist(mergeById(characters, chars));
        let extra = "";
        if (!Array.isArray(data)) {
          if (Array.isArray(data.events)) { persistEvents(mergeById(events, data.events)); extra += "・予定"; }
          if (Array.isArray(data.journal)) { persistJournal(mergeById(journal, data.journal)); extra += "・日誌"; }
          if (Array.isArray(data.watch)) { persistWatch(mergeById(watch, data.watch)); extra += "・視聴リスト"; }
          if (Array.isArray(data.posts)) { persistPosts(mergeById(posts, data.posts)); extra += "・ポスト集"; }
        }
        setListMsg(`探索者 ${chars.length} 件${extra}を読み込みました。`);
      } catch (e) {
        setListMsg("読み込みに失敗しました。バックアップ用のJSONか確認してください。");
      }
    };
    reader.readAsText(file);
  };

  /* いあきゃら等のココフォリアJSONをまとめて取り込む */
  const doBulkImport = () => {
    const objs = extractJsonObjects(bulkText);
    const added = [];
    for (const o of objs) {
      try { added.push(importCocofolia(o, blankCharacter())); } catch (e) { /* 不正な断片はスキップ */ }
    }
    if (added.length > 0) {
      persist([...added, ...characters]);
      setListMsg(`${added.length} 件の探索者を読み込みました。`);
      setBulkText("");
      setBulkOpen(false);
    } else {
      setListMsg("読み込めるデータが見つかりませんでした。JSONの形式を確認してください。");
    }
  };

  const setAb = (k, v) => setDraft({ ...draft, abilities: { ...draft.abilities, [k]: v } });

  /* 版の切替(希望すれば能力値を×5/÷5で換算) */
  const changeEdition = (newEd) => {
    if (!draft || newEd === draft.edition) return;
    let ab = { ...draft.abilities };
    if (confirm("能力値を新しい版の基準に換算しますか?\n(6版→7版は×5、7版→6版は÷5。技能値は換算されません)")) {
      const f = newEd === "7e" ? 5 : 1 / 5;
      Object.keys(ab).forEach((k) => {
        if (ab[k] !== "" && ab[k] != null && k !== "LUK") ab[k] = String(Math.round(num(ab[k]) * f));
      });
    }
    setDraft({ ...draft, edition: newEd, abilities: ab });
  };
  const setProf = (k, v) => setDraft({ ...draft, profile: { ...draft.profile, [k]: v } });
  const setSkill = (name, v) => {
    const skills = { ...draft.skills };
    if (v === "" || v === null) delete skills[name]; else skills[name] = num(v);
    setDraft({ ...draft, skills });
  };

  const ruleset = draft ? RULESETS[draft.edition] : RULESETS["6e"];

  const doImport = () => {
    try {
      setDraft(importCocofolia(ioText, draft));
      setIoMsg("読み込みました。内容を確認して「保存する」を押してください。");
    } catch (e) {
      setIoMsg("読み込みに失敗しました。JSONの形式を確認してください。");
    }
  };

  const doExport = async () => {
    const json = exportCocofolia(draft, ruleset);
    setIoText(json);
    try {
      await navigator.clipboard.writeText(json);
      setIoMsg("クリップボードにコピーしました。ココフォリアの盤面で貼り付け(Ctrl+V)してください。");
    } catch (e) {
      setIoMsg("下の欄のJSONを全選択してコピーし、ココフォリアの盤面で貼り付けてください。");
    }
  };

  const extraSkills = draft
    ? Object.keys(draft.skills).filter((n) => !masterSkillNames(ruleset).includes(n))
    : [];

  /* 今日の予定(起動時ポップアップ用) */
  const todayD = new Date();
  const todayBirthdays = characters.filter(
    (c) => num(c.birthday.month) === todayD.getMonth() + 1 && num(c.birthday.day) === todayD.getDate()
  );
  const todayEventsList = events.filter((ev) => eventOccursOn(ev, todayD));
  const charById = (id) => characters.find((c) => c.id === id);
  const charMatches = (c) => {
    const q = listQuery.trim().toLowerCase();
    if (!q) return true;
    if ([c.name, c.occupation, c.origin].some((t) => String(t || "").toLowerCase().includes(q))) return true;
    const rs = RULESETS[c.edition] || RULESETS["6e"];
    const masterSkills = rs.skillCategories.flatMap((cat) => cat.skills);
    return Object.entries(c.skills || {}).some(([sk, val]) => {
      if (!normName(sk).toLowerCase().includes(q)) return false;
      const def = masterSkills.find((s) => normName(s.n) === normName(sk));
      if (!def) return true; // 固有技能は初期値がないので常にヒット
      return num(val) !== num(skillInit(def, c.abilities));
    });
  };

  /* ランダムピックアップ: 名前を高速で切り替えてから1人に決定 */
  const spinPick = () => {
    if (characters.length === 0) {
      setListMsg("探索者が登録されていません。まずはファイルを作成してください。");
      return;
    }
    setPicking(true);
    let count = 0;
    const iv = setInterval(() => {
      const c = characters[Math.floor(Math.random() * characters.length)];
      setPickedId(c.id);
      count++;
      if (count > 14) {
        clearInterval(iv);
        setPicking(false);
      }
    }, 80);
  };

  /* TRPG予定 → セッション日誌へ転記(日付・シナリオ・探索者を引き継ぐ) */
  const recordSessionFromEvent = (ev) => {
    const dup = journal.some(
      (j) => j.date === ev.date && j.scenario === ev.title && j.characterId === ev.characterId
    );
    if (!dup) {
      persistJournal([
        { ...blankJournalEntry(), date: ev.date, scenario: ev.title, characterId: ev.characterId },
        ...journal,
      ]);
    }
    persistEvents(events.map((x) => (x.id === ev.id ? { ...x, recorded: true } : x)));
  };

  const navItem = (key, icon, label) => (
    <div onClick={() => setView(key)}
      style={isMobile ? {
        display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "8px 10px",
        cursor: "pointer", flex: "1 0 auto", minWidth: 64,
        borderBottom: `3px solid ${view === key ? T.gold : "transparent"}`,
        color: view === key ? T.gold : T.dim, fontFamily: serif, fontSize: 11,
      } : {
        display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", cursor: "pointer",
        borderRadius: 3, marginBottom: 2,
        background: view === key ? T.panel2 : "transparent",
        borderLeft: `3px solid ${view === key ? T.gold : "transparent"}`,
        color: view === key ? T.paper : T.dim,
        fontFamily: serif, fontSize: 15,
      }}>
      <span style={{ fontSize: isMobile ? 19 : 17 }}>{icon}</span>{label}
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.paper }}>
      <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", maxWidth: 1240, margin: "0 auto", alignItems: isMobile ? "stretch" : "flex-start" }}>

        {/* ===== ナビ(PC:左サイドバー / スマホ:上部タブ) ===== */}
        <aside style={isMobile ? {
          position: "sticky", top: 0, zIndex: 50, background: T.panel,
          borderBottom: `1px solid ${T.line}`, boxShadow: "0 2px 8px rgba(46,42,35,0.12)",
        } : {
          width: 220, flexShrink: 0, position: "sticky", top: 0, alignSelf: "flex-start",
          height: "100vh", boxSizing: "border-box", overflowY: "auto",
          background: T.panel, borderRight: `1px solid ${T.line}`, padding: "24px 14px",
        }}>
          {!isMobile && (
            <div style={{ padding: "0 6px 14px", borderBottom: `1px solid ${T.line}`, marginBottom: 14 }}>
              <div style={{ fontFamily: mono, fontSize: 9, letterSpacing: 2, color: T.gold }}>ARCANE ALMANAC</div>
              <div style={{ fontFamily: serif, fontSize: 17, marginTop: 4 }}>記録と予定の手帖</div>
              <div style={{ fontFamily: mono, fontSize: 9, color: T.dim, marginTop: 2 }}>CoC 6版・7版対応</div>
            </div>
          )}

          <div style={isMobile ? { display: "flex", overflowX: "auto", WebkitOverflowScrolling: "touch" } : {}}>
            {navItem("home", "🏠", "ホーム")}
            {navItem("calendar", "📅", "カレンダー")}
            {navItem("posts", "✕", "ポスト集")}
            {navItem("list", "📖", "探索者名簿")}
            {navItem("journal", "📔", "セッション日誌")}
            {navItem("watch", "▶", "視聴リスト")}
            {navItem("memo", "📝", "クイックメモ")}
            {navItem("scenario", "📚", "シナリオ管理")}
            {navItem("todo", "☑", "TODO")}
            {navItem("plan", "📋", "プラン")}
            {navItem("gm", "🎲", "GMシート")}
            {navItem("neta", "💡", "ネタ帳")}
            {navItem("illust", "🖼", "ギャラリー")}
            {navItem("health", "🩺", "体調記録")}
            {isMobile && (
              <div onClick={() => setSyncOpen(true)}
                style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "8px 10px", cursor: "pointer", flex: "1 0 auto", minWidth: 64, color: syncStatus === "ok" ? T.green : syncStatus === "error" ? T.red : T.dim, fontFamily: serif, fontSize: 11 }}>
                <span style={{ fontSize: 19 }}>☁</span>同期
              </div>
            )}
          </div>

          {!isMobile && (
            <React.Fragment>
              <div style={{ borderTop: `1px solid ${T.line}`, margin: "14px 0", paddingTop: 14 }}>
                <div onClick={spinPick}
                  style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 14px", cursor: "pointer", color: T.gold, fontFamily: serif, fontSize: 14 }}>
                  <span style={{ fontSize: 16 }}>🎲</span>ランダムピック
                </div>
              </div>
              <div style={{ padding: "0 8px", display: "grid", gap: 8, marginTop: 4 }}>
                <Btn small onClick={() => setSyncOpen(true)}>
                  {syncCode ? (syncStatus === "ok" ? "☁ 同期中 ✓" : syncStatus === "syncing" ? "☁ 同期…" : syncStatus === "error" ? "☁ 同期エラー" : "☁ 同期") : "☁ 同期を設定"}
                </Btn>
                <Btn small onClick={exportBackup}>💾 バックアップ</Btn>
                <Btn small onClick={() => fileRef.current && fileRef.current.click()}>📂 復元</Btn>
              </div>
            </React.Fragment>
          )}
        </aside>

        {/* ===== 右メイン ===== */}
        <main style={{ flex: 1, minWidth: 0, padding: isMobile ? "16px 14px 60px" : "28px 24px 60px" }}>

        {/* ===== 同期設定モーダル ===== */}
        {syncOpen && (
          <div onClick={() => setSyncOpen(false)}
            style={{ position: "fixed", inset: 0, background: "rgba(46,42,35,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 110, padding: 16 }}>
            <div onClick={(e) => e.stopPropagation()}
              style={{ background: T.panel, borderTop: `4px solid ${T.gold}`, border: `1px solid ${T.line}`, padding: 24, maxWidth: 440, width: "100%", borderRadius: 2, boxShadow: "0 8px 30px rgba(0,0,0,0.25)" }}>
              <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: 3, color: T.gold, marginBottom: 6 }}>☁ CLOUD SYNC — クラウド同期</div>
              <div style={{ fontFamily: serif, fontSize: 13, color: T.dim, lineHeight: 1.7, marginBottom: 14 }}>
                同じ「同期コード」を入れた端末どうしでデータを共有できます。PC・スマホで同じコードを設定してください。コードは推測されにくい長めの文字列にしてください(例: <span style={{ fontFamily: mono }}>hokou-cthulhu-7x9q2</span>)。
              </div>
              <Label>同期コード(合言葉)</Label>
              <input value={syncCode} onChange={(e) => setSyncCode(e.target.value)}
                placeholder="例: hokou-cthulhu-7x9q2"
                style={{ ...inputStyle, fontFamily: mono, marginBottom: 6 }} />
              <div style={{ fontFamily: mono, fontSize: 11, marginBottom: 14, color: syncStatus === "ok" ? T.green : syncStatus === "error" ? T.red : T.dim }}>
                状態: {
                  !cloud.getCode() ? "未設定(この端末のみに保存)" :
                  syncStatus === "ok" ? "同期済み ✓" :
                  syncStatus === "syncing" ? "同期中…" :
                  syncStatus === "error" ? "エラー(通信失敗・ルール未設定の可能性)" : "—"
                }
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <Btn small color={T.green} border={T.green}
                  onClick={() => { applySyncCode(syncCode); }}>この コードで同期</Btn>
                <Btn small onClick={manualPull}>↻ 今すぐ取得</Btn>
                <Btn small color={T.red} border={T.red}
                  onClick={() => { applySyncCode(""); setSyncStatus("off"); }}>同期を解除</Btn>
                <Btn small onClick={() => setSyncOpen(false)}>閉じる</Btn>
              </div>
              <div style={{ fontFamily: serif, fontSize: 11.5, color: T.dim, lineHeight: 1.7, marginTop: 14, borderTop: `1px dashed ${T.line}`, paddingTop: 10 }}>
                ※ 同じコードを別端末で初めて設定すると、クラウド側のデータがこの端末に取り込まれます。先に大事なデータがある端末から同期を始めるのが安全です。心配なときは「💾 バックアップ」で控えを取ってください。
              </div>
            </div>
          </div>
        )}

        {/* ===== 今日の予定ポップアップ ===== */}
        {popupOpen && (todayBirthdays.length > 0 || todayEventsList.length > 0) && (
          <div onClick={() => setPopupOpen(false)}
            style={{ position: "fixed", inset: 0, background: "rgba(46,42,35,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
            <div onClick={(e) => e.stopPropagation()}
              style={{ background: T.panel, borderTop: `4px solid ${T.gold}`, border: `1px solid ${T.line}`, padding: 24, maxWidth: 440, width: "88%", borderRadius: 2, boxShadow: "0 8px 30px rgba(0,0,0,0.25)" }}>
              <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: 3, color: T.gold, marginBottom: 10 }}>
                TODAY — 今日の予定 ({todayD.getMonth() + 1}/{todayD.getDate()})
              </div>
              {todayBirthdays.map((c) => (
                <div key={c.id} style={{ fontFamily: serif, fontSize: 15, padding: "4px 0", color: T.red, display: "flex", gap: 8, alignItems: "baseline" }}>
                  <span style={{ flex: 1 }}>🎂 {c.name || "(名称未記入)"} の誕生日です!</span>
                  <a href={googleCalendarUrl(c)} target="_blank" rel="noreferrer" title="Googleカレンダーに追加"
                    style={{ fontFamily: mono, fontSize: 10, color: T.green, textDecoration: "none" }}>G+</a>
                </div>
              ))}
              {todayEventsList.map((ev) => (
                <div key={ev.id} style={{ fontFamily: serif, fontSize: 15, padding: "4px 0", display: "flex", gap: 8, alignItems: "baseline" }}>
                  <span style={{ fontFamily: mono, fontSize: 10, color: "#fff", background: EVENT_CATS[ev.cat] || T.dim, padding: "1px 6px", borderRadius: 8 }}>{ev.cat}</span>
                  {ev.cat === "TRPG" && ev.role && (
                    <span style={{ fontFamily: mono, fontSize: 10, color: "#fff", background: ev.role === "GM" ? T.gold : T.green, padding: "1px 6px", borderRadius: 8 }}>{ev.role}</span>
                  )}
                  <span style={{ flex: 1 }}>{ev.time && `${ev.time} `}{ev.title}</span>
                  {ev.cat === "TRPG" && ev.characterId && charById(ev.characterId) && (
                    <span onClick={() => { setPopupOpen(false); openView(charById(ev.characterId)); }}
                      style={{ fontFamily: serif, fontSize: 12, color: T.green, cursor: "pointer", textDecoration: "underline", whiteSpace: "nowrap" }}>
                      シートへ
                    </span>
                  )}
                  {ev.discord && (
                    <a href={ev.discord} target="_blank" rel="noreferrer"
                      style={{ fontFamily: mono, fontSize: 11, color: "#5865F2", textDecoration: "none", whiteSpace: "nowrap" }}>💬 Discord ↗</a>
                  )}
                  {ev.url && (
                    <a href={ev.url} target="_blank" rel="noreferrer"
                      style={{ fontFamily: mono, fontSize: 11, color: T.green, textDecoration: "none", whiteSpace: "nowrap" }}>{linkLabel(ev.url)}</a>
                  )}
                </div>
              ))}
              <div style={{ textAlign: "right", marginTop: 14 }}>
                <Btn small onClick={() => setPopupOpen(false)}>閉じる</Btn>
              </div>
            </div>
          </div>
        )}

        {/* ===== ホーム ===== */}
        {view === "home" && (() => {
          const upcoming = (() => {
            const seen = new Set();
            const result = [];
            for (let i = 1; i <= 7; i++) {
              const d = new Date(); d.setDate(d.getDate() + i);
